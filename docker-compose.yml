services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /app/var/log/worker.log
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL}
      AVITO_BASE_URL: ${AVITO_BASE_URL}
      AVITO_LAST_REPORT_PATH: ${AVITO_LAST_REPORT_PATH}
      AVITO_ERROR_ADS_PATH: ${AVITO_ERROR_ADS_PATH}
      AVITO_ERROR_CODES: ${AVITO_ERROR_CODES}
    volumes:
      - ./var/log:/app/var/log
